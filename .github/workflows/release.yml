name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Nuitka downloads a C toolchain and Dependency Walker on first use and
      # caches them here; persisting the cache avoids re-downloading every run
      # (and the transient download failures that come with it).
      - name: Cache Nuitka toolchain & build
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: nuitka-${{ runner.os }}-

      - name: Build Windows executable
        run: pwsh -File build.ps1 -SkipIcon

      - name: Draft release with the exe attached
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/*.exe
