name: Lint

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Ruff lint
        run: uvx ruff check --output-format=github .
